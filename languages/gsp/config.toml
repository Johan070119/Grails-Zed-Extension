name = "GSP"
grammar = "html"
path_suffixes = ["gsp"]
line_comments = ["<%-- ", " --%>"]
autoclose_before = ");:,|"
brackets = [
  { start = "{", end = "}", close = true, newline = true },
  { start = "[", end = "]", close = true, newline = false },
  { start = "(", end = ")", close = true, newline = false },
  { start = "<", end = ">", close = false, newline = false },
  { start = "\"", end = "\"", close = true, newline = false },
  { start = "'", end = "'", close = true, newline = false },
]
tab_size = 4

[[language_servers]]
name = "grails-lsp"
